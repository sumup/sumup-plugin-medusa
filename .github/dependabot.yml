version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    groups:
      medusa:
        patterns:
          - "@medusajs/*"
      tooling:
        patterns:
          - "@biomejs/*"
          - "ts-node"
          - "typescript"
          - "vitest"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "npm"
    directory: "/examples/docker/medusa"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    groups:
      medusa-example:
        patterns:
          - "@medusajs/*"
      react-example:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      example-tooling:
        patterns:
          - "@swc/*"
          - "@types/node"
          - "ts-node"
          - "typescript"
          - "vite"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/examples/docker/medusa"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/examples/docker/storefront"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
